<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #fafafa; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 40px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { text-align: center; margin-bottom: 25px; }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; margin-bottom: 5px; font-weight: 500; }
        .input-group input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #000; color: #fff; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; font-weight: 600; }
        button:hover { background: #333; }
        p.redirect { text-align: center; margin-top: 15px; font-size: 14px; }
        p.redirect a { color: #000; text-decoration: underline; }
        #message { margin-top: 15px; text-align: center; font-weight: 500; }
        .success { color: green; }
        .error { color: red; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Welcome Back</h2>
        <form id="loginForm">
            <div class="input-group">
                <label>Email</label>
                <input type="email" id="email" required>
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password" required>
            </div>
            <button type="submit">Log In</button>
        </form>
        <p class="redirect">Don't have an account? <a href="/register">Register here</a></p>
        <div id="message"></div>
    </div>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const msg = document.getElementById('message');
            msg.textContent = 'Logging in...';
            msg.className = '';
            
            const payload = {
                email: document.getElementById('email').value,
                password: document.getElementById('password').value
            };
            
            try {
                const res = await fetch('/api/v1/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                
                if (res.ok && data.success) {
                    msg.textContent = 'Login successful!';
                    msg.className = 'success';
                    // Store userId locally
                    if (data.user && data.user.id) {
                        localStorage.setItem('userId', data.user.id);
                        localStorage.setItem('userEmail', data.user.email);
                        localStorage.setItem('userName', data.user.full_name);
                    }
                    setTimeout(() => { window.location.href = '/assessment'; }, 1000);
                } else {
                    msg.textContent = data.message || 'Login failed.';
                    msg.className = 'error';
                }
            } catch (err) {
                msg.textContent = 'Error: ' + err.message;
                msg.className = 'error';
            }
        });
    </script>
</body>
</html>
